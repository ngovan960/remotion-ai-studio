<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <!-- Background -->
  <rect width="1200" height="400" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="600" y="40" font-family="Arial" font-size="28" fill="white" text-anchor="middle" font-weight="bold">
    TIMELINE: 66 TRIỆU NĂM TRƯỚC
  </text>
  
  <!-- Timeline Line -->
  <line x1="50" y1="200" x2="1150" y2="200" stroke="#3498db" stroke-width="4"/>
  
  <!-- Event 1: Va chạm -->
  <circle cx="100" cy="200" r="15" fill="#e74c3c"/>
  <text x="100" y="180" font-family="Arial" font-size="14" fill="white" text-anchor="middle">GIỜ 0</text>
  <text x="100" y="240" font-family="Arial" font-size="12" fill="#e74c3c" text-anchor="middle">VA CHẠM</text>
  <text x="100" y="260" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">12km asteroid</text>
  
  <!-- Event 2: Sóng thần -->
  <circle cx="250" cy="200" r="15" fill="#e67e22"/>
  <text x="250" y="180" font-family="Arial" font-size="14" fill="white" text-anchor="middle">GIỜ 1</text>
  <text x="250" y="240" font-family="Arial" font-size="12" fill="#e67e22" text-anchor="middle">SÓNG THẦN</text>
  <text x="250" y="260" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">1.5km cao</text>
  
  <!-- Event 3: Bụi che phủ -->
  <circle cx="400" cy="200" r="15" fill="#f39c12"/>
  <text x="400" y="180" font-family="Arial" font-size="14" fill="white" text-anchor="middle">NGÀY 1</text>
  <text x="400" y="240" font-family="Arial" font-size="12" fill="#f39c12" text-anchor="middle">BỤI CHE PHỦ</text>
  <text x="400" y="260" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">Bầu trời tối</text>
  
  <!-- Event 4: Nhiệt độ giảm -->
  <circle cx="550" cy="200" r="15" fill="#3498db"/>
  <text x="550" y="180" font-family="Arial" font-size="14" fill="white" text-anchor="middle">THÁNG 1</text>
  <text x="550" y="240" font-family="Arial" font-size="12" fill="#3498db" text-anchor="middle">NHIỆT ĐỘ GIẢM</text>
  <text x="550" y="260" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">-26°C</text>
  
  <!-- Event 5: 75% chết -->
  <circle cx="700" cy="200" r="20" fill="#e74c3c"/>
  <text x="700" y="175" font-family="Arial" font-size="14" fill="white" text-anchor="middle">NĂM 1</text>
  <text x="700" y="245" font-family="Arial" font-size="14" fill="#e74c3c" text-anchor="middle" font-weight="bold">75% CHẾT</text>
  <text x="700" y="265" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">Tuyệt chủng K-Pg</text>
  
  <!-- Event 6: Hồi phục -->
  <circle cx="850" cy="200" r="15" fill="#2ecc71"/>
  <text x="850" y="180" font-family="Arial" font-size="14" fill="white" text-anchor="middle">NĂM 100K</text>
  <text x="850" y="240" font-family="Arial" font-size="12" fill="#2ecc71" text-anchor="middle">HỒI PHỤC</text>
  <text x="850" y="260" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">Đời sống tái thiết</text>
  
  <!-- Event 7: Hiện tại -->
  <circle cx="1050" cy="200" r="20" fill="#9b59b6"/>
  <text x="1050" y="175" font-family="Arial" font-size="14" fill="white" text-anchor="middle">66 TRIỆU NĂM</text>
  <text x="1050" y="245" font-family="Arial" font-size="14" fill="#9b59b6" text-anchor="middle" font-weight="bold">HIỆN TẠI</text>
  <text x="1050" y="265" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">Chúng ta ngồi đây</text>
  
  <!-- Legend -->
  <rect x="50" y="320" width="20" height="10" fill="#e74c3c"/>
  <text x="80" y="330" font-family="Arial" font-size="11" fill="white">Điểm quan trọng</text>
  
  <rect x="200" y="320" width="20" height="10" fill="#3498db"/>
  <text x="230" y="330" font-family="Arial" font-size="11" fill="white">Thay đổi khí hậu</text>
  
  <rect x="400" y="320" width="20" height="10" fill="#2ecc71"/>
  <text x="430" y="330" font-family="Arial" font-size="11" fill="white">Hồi phục</text>
  
  <rect x="550" y="320" width="20" height="10" fill="#9b59b6"/>
  <text x="580" y="330" font-family="Arial" font-size="11" fill="white">Hiện tại</text>
  
  <!-- Source -->
  <text x="600" y="380" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">
    Nguồn: Schulte et al. (2010), Renne et al. (2013), Chiarenza et al. (2020)
  </text>
</svg>
